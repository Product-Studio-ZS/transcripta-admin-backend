name: Deploy Admin Backend

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set registry owner (lowercase)
        id: owner
        run: |
          if [ -n "${{ vars.REGISTRY_OWNER }}" ]; then
            OWNER="${{ vars.REGISTRY_OWNER }}"
          else
            OWNER="${{ github.repository_owner }}"
          fi
          echo "value=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push admin backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/transcripta-admin-backend:staging
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/transcripta-admin-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy admin backend to staging
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            docker pull ghcr.io/${OWNER}/transcripta-admin-backend:staging
            cd /var/www/transcripta/transcripta-admin-backend
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
