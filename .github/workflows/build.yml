name: Build Admin Backend

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set registry owner (lowercase)
        id: owner
        run: |
          if [ -n "${{ vars.REGISTRY_OWNER }}" ]; then
            OWNER="${{ vars.REGISTRY_OWNER }}"
          else
            OWNER="${{ github.repository_owner }}"
          fi
          echo "value=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push admin backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/transcripta-admin-backend:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/transcripta-admin-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
